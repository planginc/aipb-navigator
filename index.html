    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {

      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

      position: fixed;
      inset: 0;
      pointer-events: none;

    }

    .header {
      padding: 2.5rem 1.5rem 1.5rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      padding: 0.35rem 0.75rem;
      border-radius: 2px;
      margin-bottom: 1rem;
    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
    }

    .header p {
      color: var(--text-muted);
      font-size: 0.95rem;
      max-width: 600px;
    }

    .search-area {
      max-width: 960px;
      margin: 0 auto;
      padding: 0.5rem 1.5rem 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
    }

    .search-area::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 0;
      right: 0;
      height: 20px;
      background: linear-gradient(to bottom, var(--bg), transparent);
      pointer-events: none;
    }

    .search-box {
      position: relative;
    }

    .search-box svg {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 18px;
      height: 18px;
    }

    .search-box input {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-box input::placeholder {
      color: var(--text-muted);
    }

    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .filter-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.35rem 0.65rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover {
      border-color: var(--accent-border);
      color: var(--text);
    }

    .filter-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent-border);
      color: var(--accent);
    }

    .results-meta {
      max-width: 960px;
      margin: 0 auto;
      padding: 0.5rem 1.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .results {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.25rem 1.5rem;
      transition: border-color 0.2s, transform 0.15s;
      cursor: default;
    }

    .card:hover {
      border-color: var(--accent-border);
      transform: translateY(-1px);
    }

    .card.locked {
      background: var(--locked-bg);
      border-color: var(--locked-border);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.6rem;
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.35;
    }

    .card.locked .card-title {
      color: var(--locked-text);
    }

    .card-category {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.25rem 0.5rem;
      border-radius: 2px;
      white-space: nowrap;
      flex-shrink: 0;

    .cat-locked { background: var(--locked-bg); color: var(--locked-text); border: 1px solid var(--locked-border); }

    .card-body {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.65;
      margin-bottom: 0.75rem;
    }

      padding: 0.05em 0.2em;

      background: var(--tag-bg);

      padding: 1.5rem;

      font-size: 0.8rem;
      color: var(--text-muted);

      justify-content: space-between;
      flex-wrap: wrap;

      .card { padding: 1rem; }

// Search + filter logic
const searchInput = document.getElementById('search');
const resultsDiv = document.getElementById('results');
const resultsMeta = document.getElementById('resultsMeta');
const filterBtns = document.querySelectorAll('.filter-btn');
let activeFilter = 'all';

function escapeRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlightText(text, query) {
  if (!query) return text;
  const words = query.trim().split(/\s+/).filter(w => w.length > 1);
  if (words.length === 0) return text;
  const pattern = new RegExp(`(${words.map(escapeRegex).join('|')})`, 'gi');
  return text.replace(pattern, '<mark>$1</mark>');
}

function scoreMatch(item, query) {
  if (!query) return 1;
  const words = query.toLowerCase().trim().split(/\s+/).filter(w => w.length > 1);
  if (words.length === 0) return 1;
  let score = 0;
  const titleLower = item.title.toLowerCase();
  const descLower = item.description.toLowerCase();
  const topicsStr = item.topics.join(' ').toLowerCase();

  for (const word of words) {
    if (titleLower.includes(word)) score += 10;
    if (topicsStr.includes(word)) score += 5;
    if (descLower.includes(word)) score += 2;
  }
  return score;
}

function getCategoryLabel(cat) {
  const labels = {
    course: 'Course',
    classroom: 'Classroom',
    framework: 'Framework',
    resource: 'Resource',
    locked: 'Locked'
  };
  return labels[cat] || cat;
}

function render() {
  const query = searchInput.value.trim();
  let items = DATA;

  // Filter by category
  if (activeFilter !== 'all') {
    items = items.filter(item => item.category === activeFilter);
  }

  // Score and filter by search
  if (query) {
    items = items
      .map(item => ({ ...item, score: scoreMatch(item, query) }))
      .filter(item => item.score > 0)
      .sort((a, b) => b.score - a.score);
  }

  // Update meta
  const total = items.length;
  const label = query ? `${total} result${total !== 1 ? 's' : ''} for "${query}"` : `${total} classroom${total !== 1 ? 's' : ''}`;
  resultsMeta.textContent = label;

  // Render cards
  if (items.length === 0) {
    resultsDiv.innerHTML = `
      <div class="empty-state">
        <h3>No matches found</h3>
        <p>Try different keywords or clear the filter.</p>
      </div>`;
    return;
  }

  resultsDiv.innerHTML = items.map(item => {
    const isLocked = item.category === 'locked';
    return `
      <div class="card ${isLocked ? 'locked' : ''}">
        <div class="card-header">
          <div class="card-title">${highlightText(item.title, query)}</div>
          <span class="card-category cat-${item.category}">${getCategoryLabel(item.category)}</span>
        </div>
        <div class="card-body">${highlightText(item.description, query)}</div>
        <div class="card-topics">
          ${item.topics.map(t => `<span class="topic-tag">${t}</span>`).join('')}
        </div>
      </div>`;
  }).join('');
}

// Event listeners
searchInput.addEventListener('input', render);

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

// Initial render
render();
</script>
